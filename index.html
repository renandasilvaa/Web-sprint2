<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamSense - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">
    <h1>JOVI CamSense</h1>
    <p>Bem vindo, por favor registre sua conta.</p>

    <div  class="login-box">
        <form id="loginForm">
            <div class="loginData">
                <label for="email">Email: </label>
                <input type="email" id="email" placeholder="exemplo@gmail.com">

                <label for="password">Senha:</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit" onclick="verificarLogin()">Cadastrar</button>
        </form>

    </div>

    <script src="js/login.js"></script>
</body>
</html>
