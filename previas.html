<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamSense - Prévias</title>
    <link rel="stylesheet" href="css/previas.css">
</head>
<body class="preview-body">
    <div class="preview-header">
        <h1>CamSense Previews</h1>
        <h3>Escolha um modo para ver uma prévia!</h3>
    </div>

    <div class="preview-modes">
        <div class="preview-pet">
            <img width="385" height="350" id="slideshow-pet" onclick="startSlideshow()" src="assets/imgs/modo-pet.png" alt="Foto do Modo Pet da JOVI Previews">
            <h3>Modo Pet</h3>
        </div>

        <div class="preview-docs">
            <img width="410" height="350" src="assets/imgs/modo-docs.png" alt="Foto do Modo Documentos da JOVI Previews">
            <h3>Modo Documentos</h3>
        </div>

        <div class="preview-chatbot">
            <img width="410" height="350" onclick="startChatbot()" src="assets/imgs/chatbot.png" alt="Foto do Chatbot da JOVI Previews">
            <h3>Chatbot</h3>
        </div>
    </div>

    <script src="js/previas.js"></script>
</body>
</html>
